[package]
edition = "2024"
rust-version = "1.85"
name = "speakrs"
version = "0.4.2"
authors = ["Praveen Perera"]
build = false
include = [
    "/src/**",
    "/examples/**",
    "/README.md",
    "/LICENSE",
    "/Cargo.toml",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Fast Rust speaker diarization with pyannote-level accuracy and native CoreML/CUDA acceleration"
documentation = "https://docs.rs/speakrs"
readme = "README.md"
keywords = [
    "speaker",
    "diarization",
    "audio",
    "pyannote",
    "onnx",
]
categories = [
    "multimedia::audio",
    "science",
]
license = "Apache-2.0"
repository = "https://github.com/avencera/speakrs"

[package.metadata.docs.rs]
features = [
    "cuda",
    "load-dynamic",
    "_metrics",
]

[features]
_metrics = []
coreml = [
    "dep:objc2",
    "dep:objc2-core-ml",
    "dep:objc2-foundation",
    "dep:block2",
]
cuda = ["ort/cuda"]
default = [
    "online",
    "default-linalg",
]
default-linalg = ["dep:ndarray-linalg-default"]
intel-mkl = ["dep:ndarray-linalg-mkl"]
load-dynamic = [
    "ort/load-dynamic",
    "dep:libloading",
]
migraphx = ["ort/migraphx"]
online = [
    "dep:hf-hub",
    "hf-hub/ureq",
    "hf-hub/native-tls",
]
openblas-static = ["dep:ndarray-linalg-static"]
openblas-system = ["dep:ndarray-linalg-system"]

[lib]
name = "speakrs"
path = "src/lib.rs"

[[example]]
name = "assign_transcript_speakers"
path = "examples/assign_transcript_speakers.rs"

[[example]]
name = "diarize_wav"
path = "examples/diarize_wav.rs"

[[example]]
name = "print_turns"
path = "examples/print_turns.rs"

[[example]]
name = "speaker_airtime"
path = "examples/speaker_airtime.rs"

[dependencies.crossbeam-channel]
version = "0.5"

[dependencies.hf-hub]
version = "0.5"
optional = true
default-features = false

[dependencies.kodama]
version = "0.3.0"

[dependencies.libloading]
version = "0.9.0"
optional = true

[dependencies.ndarray]
version = "0.17.2"

[dependencies.ndarray-linalg-mkl]
version = "0.18.1"
features = ["intel-mkl-static"]
optional = true
package = "ndarray-linalg"

[dependencies.ndarray-linalg-static]
version = "0.18.1"
features = ["openblas-static"]
optional = true
package = "ndarray-linalg"

[dependencies.ndarray-linalg-system]
version = "0.18.1"
features = ["openblas-system"]
optional = true
package = "ndarray-linalg"

[dependencies.ndarray-npy]
version = "0.10.0"

[dependencies.ort]
version = "2.0.0-rc.12"
features = ["ndarray"]

[dependencies.rayon]
version = "1.11.0"

[dependencies.thiserror]
version = "2.0.18"

[dependencies.tracing]
version = "0.1.44"

[dev-dependencies.approx]
version = "0.5.1"

[dev-dependencies.serde_json]
version = "1"

[dev-dependencies.tracing-subscriber]
version = "0.3.22"
features = ["env-filter"]

[target.'cfg(not(target_arch = "x86_64"))'.dependencies.ndarray-linalg-default]
version = "0.18.1"
features = ["openblas-static"]
optional = true
package = "ndarray-linalg"

[target.'cfg(all(target_arch = "x86_64", not(target_os = "windows")))'.dependencies.ndarray-linalg-default]
version = "0.18.1"
features = ["openblas-static"]
optional = true
